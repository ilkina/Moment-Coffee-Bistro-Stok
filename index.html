<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Moment Coffee&Bistro Stok">
<meta name="theme-color" content="#0f0f0f">
<title>Moment Coffee&Bistro Stok</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --text: #f0ece6;
  --muted: #888;
  --dim: #555;
  --accent: #c8a97e;
  --accent2: #7ec8a9;
  --danger: #e07070;
  --warn: #e0b870;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

.header {
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  flex-shrink: 0; position: relative; z-index: 10;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.brand { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
.header-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 16px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s;
}
.icon-btn:active { background: var(--surface2); transform: scale(0.95); }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 12px; }
.stat-pill { background: var(--surface); border-radius: 10px; padding: 7px 6px; display: flex; flex-direction: column; align-items: center; }
.stat-n { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; line-height: 1; }
.stat-n.g { color: var(--accent2); }
.stat-n.r { color: var(--danger); }
.stat-n.w { color: var(--warn); }
.stat-n.d { color: var(--text); }
.stat-l { font-size: 9px; color: var(--muted); margin-top: 3px; letter-spacing: 0.04em; text-align: center; }

.progress { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent2); border-radius: 2px; transition: width 0.5s ease; }

.controls { padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-wrap { position: relative; margin-bottom: 8px; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 15px; padding: 10px 14px 10px 38px; outline: none; transition: border-color 0.15s;
}
.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--dim); }
.filter-row { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.ftag {
  flex-shrink: 0; font-size: 12px; font-weight: 500; padding: 5px 12px;
  border-radius: 20px; border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.ftag.active { background: var(--accent); border-color: var(--accent); color: #0f0f0f; }
.ftag.warn-filter.active { background: var(--danger); border-color: var(--danger); color: #fff; }

.cat-nav {
  display: flex; overflow-x: auto; scrollbar-width: none;
  border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg);
}
.cat-nav::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0; font-size: 12px; padding: 10px 14px;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.15s; white-space: nowrap; font-weight: 500;
}
.cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.list-inner { padding: 8px 14px calc(var(--safe-bottom) + 80px); }
.cat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); padding: 14px 4px 7px; }

.item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 12px 14px; margin-bottom: 6px;
  cursor: pointer; transition: all 0.15s; -webkit-user-select: none; user-select: none;
}
.item:active { transform: scale(0.98); background: var(--surface2); }
.item.low-stock { border-color: rgba(224,112,112,0.5); background: rgba(224,112,112,0.05); }
.item.done { opacity: 0.4; }
.item.done .item-name { text-decoration: line-through; }

.item-top { display: flex; align-items: center; gap: 10px; }
.check {
  width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
  border: 2px solid var(--border); display: flex; align-items: center;
  justify-content: center; transition: all 0.2s;
}
.item.done .check { background: var(--accent2); border-color: var(--accent2); }
.check-svg { opacity: 0; transition: opacity 0.15s; }
.item.done .check-svg { opacity: 1; }
.item-body { flex: 1; min-width: 0; }
.item-name { font-size: 14px; font-weight: 400; color: var(--text); line-height: 1.3; }
.item-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
.badge { font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 20px; flex-shrink: 0; }
.badge.var { background: rgba(126,200,169,0.12); color: var(--accent2); }
.badge.eksik { background: rgba(224,112,112,0.12); color: var(--danger); }
.badge.az { background: rgba(224,184,112,0.15); color: var(--warn); }

/* MIKTAR SATIRI */
.item-qty { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.qty-label { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.qty-controls { display: flex; align-items: center; gap: 6px; flex: 1; }
.qty-btn {
  width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-size: 16px; font-weight: 400;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.15s; flex-shrink: 0;
}
.qty-btn:active { transform: scale(0.9); background: var(--border); }
.qty-val { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; min-width: 60px; text-align: center; color: var(--text); }
.qty-val.low { color: var(--danger); }
.qty-val.med { color: var(--warn); }
.qty-val.ok { color: var(--accent2); }
.qty-unit { font-size: 11px; color: var(--muted); }
.low-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; background: rgba(224,112,112,0.15); color: var(--danger); flex-shrink: 0; }

.empty { text-align: center; color: var(--dim); padding: 48px 20px; font-size: 14px; }
.empty-icon { font-size: 36px; margin-bottom: 12px; }

/* OVERLAY & SHEET */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50;
  opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(4px);
}
.overlay.show { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
  background: var(--surface); border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  padding: 0 0 calc(var(--safe-bottom) + 20px);
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height: 85vh; display: flex; flex-direction: column;
}
.sheet.show { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 12px auto 0; }
.sheet-title { font-size: 16px; font-weight: 600; padding: 14px 20px 10px; border-bottom: 1px solid var(--border); }
.sheet-body { overflow-y: auto; flex: 1; padding: 12px 20px; }
.sheet-row { margin-bottom: 12px; }
.sheet-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.sheet-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 15px; padding: 11px 14px; outline: none;
}
.sheet-input:focus { border-color: var(--accent); }
.unit-row { display: flex; gap: 8px; }
.unit-btn {
  flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 13px; cursor: pointer; transition: all 0.15s; text-align: center;
}
.unit-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,169,126,0.08); }
.cat-option {
  display: flex; align-items: center; gap: 10px; padding: 12px 0;
  cursor: pointer; border-bottom: 1px solid var(--border); font-size: 14px; transition: opacity 0.1s;
}
.cat-option:active { opacity: 0.6; }
.cat-option.selected { color: var(--accent); }
.cat-emoji { font-size: 18px; width: 26px; text-align: center; }
.add-btn {
  width: 100%; padding: 14px; background: var(--accent); color: #0f0f0f;
  border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-top: 4px;
}
.add-btn:active { transform: scale(0.97); }

.fab {
  position: fixed; bottom: calc(var(--safe-bottom) + 20px); right: 20px; z-index: 40;
  width: 54px; height: 54px; border-radius: 16px; background: var(--accent);
  border: none; color: #0f0f0f; font-size: 26px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; box-shadow: 0 4px 20px rgba(200,169,126,0.3);
  transition: all 0.15s;
}
.fab:active { transform: scale(0.92); }

.toast {
  position: fixed; bottom: calc(var(--safe-bottom) + 88px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-size: 13px; padding: 10px 20px; border-radius: 20px; z-index: 100;
  opacity: 0; transition: all 0.25s; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="brand">☕ MOMENT COFFEE&BISTRO STOK</div>
      <div class="header-actions">
        <button class="icon-btn" onclick="resetAll()" title="Sıfırla">↺</button>
        <button class="icon-btn" onclick="copyMissing()" title="Eksikleri kopyala">⎘</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-pill"><div class="stat-n g" id="s-ok">0</div><div class="stat-l">Mevcut</div></div>
      <div class="stat-pill"><div class="stat-n r" id="s-miss">0</div><div class="stat-l">Eksik</div></div>
      <div class="stat-pill"><div class="stat-n w" id="s-low">0</div><div class="stat-l">Az Kaldı</div></div>
      <div class="stat-pill"><div class="stat-n d" id="s-total">0</div><div class="stat-l">Toplam</div></div>
    </div>
    <div class="progress"><div class="progress-fill" id="prog"></div></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search" type="search" placeholder="Malzeme ara..." id="search" oninput="render()" autocomplete="off"/>
    </div>
    <div class="filter-row">
      <button class="ftag active" onclick="setFilter('tumu',this)">Tümü</button>
      <button class="ftag warn-filter" onclick="setFilter('az',this)">⚠ Az Kaldı</button>
      <button class="ftag" onclick="setFilter('eksik',this)">Eksikler</button>
      <button class="ftag" onclick="setFilter('var',this)">Mevcut</button>
    </div>
  </div>

  <div class="cat-nav" id="cat-nav"></div>
  <div class="list-wrap"><div class="list-inner" id="list"></div></div>
</div>

<button class="fab" onclick="openAdd()">+</button>
<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Yeni Malzeme Ekle</div>
  <div class="sheet-body">
    <div class="sheet-row">
      <div class="sheet-lbl">Malzeme Adı</div>
      <input class="sheet-input" type="text" placeholder="Adı yaz..." id="new-name" autocomplete="off"/>
    </div>
    <div class="sheet-row">
      <div class="sheet-lbl">Not (opsiyonel)</div>
      <input class="sheet-input" type="text" placeholder="Açıklama..." id="new-note" autocomplete="off"/>
    </div>
    <div class="sheet-row">
      <div class="sheet-lbl">Miktar Birimi</div>
      <div class="unit-row">
        <button class="unit-btn active" onclick="selectUnit('adet',this)">Adet</button>
        <button class="unit-btn" onclick="selectUnit('gr',this)">Gram</button>
        <button class="unit-btn" onclick="selectUnit('ml',this)">ML</button>
        <button class="unit-btn" onclick="selectUnit('kg',this)">KG</button>
        <button class="unit-btn" onclick="selectUnit('lt',this)">Litre</button>
      </div>
    </div>
    <div class="sheet-row">
      <div class="sheet-lbl">Mevcut Miktar</div>
      <input class="sheet-input" type="number" placeholder="0" id="new-qty" min="0"/>
    </div>
    <div class="sheet-row">
      <div class="sheet-lbl">Uyarı Eşiği (bu miktarın altında kırmızı göster)</div>
      <input class="sheet-input" type="number" placeholder="Adet → 1 / Gram → 100" id="new-threshold" min="0"/>
    </div>
    <div class="sheet-row">
      <div class="sheet-lbl">Kategori</div>
      <div id="cat-list"></div>
    </div>
    <button class="add-btn" onclick="addItem()">Ekle</button>
  </div>
</div>

<div class="toast" id="toast"></div>

  { id:'ilkyardim', label:'İlk Yardım', emoji:'🩺', items:[
    {n:'Yara bandı (çeşitli boy)', unit:'adet', qty:0, threshold:1},

    {n:'Makas (ilk yardım)', unit:'adet', qty:0, threshold:1},

    {n:'Soğuk kompres', unit:'adet', qty:0, threshold:1},
    {n:'Eldiven (lateks)', unit:'adet', qty:0, threshold:1},
    {n:'Yanık kremi', unit:'adet', qty:0, threshold:1},
  ]},
  { id:'kagit', label:'Kağıt & Hijyen', emoji:'🧻', items:[
    {n:'Tuvalet kağıdı', unit:'adet', qty:0, threshold:1},
    {n:'Z kağıt havlu', note:'Dispanser için', unit:'adet', qty:0, threshold:1},
    {n:'Kağıt havlu (rulo)', unit:'adet', qty:0, threshold:1},
    {n:'Z peçete', unit:'adet', qty:0, threshold:1},
    {n:'Dispanser peçete', unit:'adet', qty:0, threshold:1},
    {n:'Sıvı sabun', unit:'adet', qty:0, threshold:1},
  ]},
  { id:'ekipman', label:'Ekipman', emoji:'🧰', items:[
    {n:'French press', note:'3 adet', unit:'adet', qty:0, threshold:1},
    {n:'Latte bardağı', unit:'adet', qty:0, threshold:1},
    {n:'Sıcak kahve fincan/bardak', unit:'adet', qty:0, threshold:1},
    {n:'Soğuk kahve bardak', unit:'adet', qty:0, threshold:1},
    {n:'Tepsi', unit:'adet', qty:0, threshold:1},
    {n:'Hot dog makinesi', unit:'adet', qty:0, threshold:1},
    {n:'Tekli ızgara flat plate', unit:'adet', qty:0, threshold:1},
    {n:'Salata kasesi', unit:'adet', qty:0, threshold:1},
    {n:'Çıtırlar için sepet', unit:'adet', qty:0, threshold:1},
  ]},
];

let state = {};
let filter = 'tumu';
let activeCat = 'all';
let newUnit = 'adet';
let newCatId = CATS[0].id;

function key(catId, name) { return catId + '||' + name; }

function init() {
  const saved = localStorage.getItem('moment_stok_v3');
  if (saved) {
    try { state = JSON.parse(saved); } catch(e) { state = {}; }
  }
  CATS.forEach(cat => cat.items.forEach(it => {
    const k = key(cat.id, it.n);
    if (!state[k]) state[k] = { checked: false, qty: it.qty || 0, unit: it.unit || 'adet', threshold: it.threshold || 1 };
  }));
  save();
}

function save() { localStorage.setItem('moment_stok_v3', JSON.stringify(state)); }

function toggleCheck(k, e) {
  e.stopPropagation();
  state[k].checked = !state[k].checked;
  save(); render();
}

function changeQty(k, delta, e) {
  e.stopPropagation();
  state[k].qty = Math.max(0, (state[k].qty || 0) + delta);
  save(); render();
}

function isLow(k) {
  const s = state[k];
  return s && !s.checked && s.qty <= s.threshold && s.qty >= 0;
}

function resetAll() {
  if (!confirm('Tüm işaretleri sıfırla?')) return;
  Object.keys(state).forEach(k => { state[k].checked = false; });
  save(); render(); toast('Sıfırlandı');
}

function copyMissing() {
  const lines = ['📋 Moment Stok — Eksik & Az Kalan\n'];
  CATS.forEach(cat => {
    const missing = cat.items.filter(it => {
      const k = key(cat.id, it.n);
      const s = state[k];
      return s && (!s.checked || isLow(k));
    });
    if (missing.length) {
      lines.push(cat.emoji + ' ' + cat.label);
      missing.forEach(it => {
        const k = key(cat.id, it.n);
        const s = state[k];
        const low = isLow(k) ? ` ⚠ (${s.qty} ${s.unit})` : '';
        lines.push('  • ' + it.n + low);
      });
      lines.push('');
    }
  });
  navigator.clipboard?.writeText(lines.join('\n')).then(() => toast('Kopyalandı ✓'));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function setFilter(f, el) {
  filter = f;
  document.querySelectorAll('.ftag').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setCat(id) {
  activeCat = id;
  render();
}

function getQtyClass(qty, threshold) {
  if (qty === 0) return 'r';
  if (qty <= threshold) return 'low';
  if (qty <= threshold * 2) return 'med';
  return 'ok';
}

function getVisible(cat) {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return cat.items.filter(it => {
    const k = key(cat.id, it.n);
    const s = state[k];
    if (!s) return false;
    if (filter === 'var' && !s.checked) return false;
    if (filter === 'eksik' && s.checked) return false;
    if (filter === 'az' && !isLow(k)) return false;
    if (q && !it.n.toLowerCase().includes(q) && !(it.note||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

function render() {
  const allKeys = Object.keys(state);
  const ok = allKeys.filter(k => state[k].checked).length;
  const low = allKeys.filter(k => isLow(k)).length;
  const miss = allKeys.filter(k => !state[k].checked).length;
  document.getElementById('s-ok').textContent = ok;
  document.getElementById('s-miss').textContent = miss;
  document.getElementById('s-low').textContent = low;
  document.getElementById('s-total').textContent = allKeys.length;
  document.getElementById('prog').style.width = (allKeys.length ? ok/allKeys.length*100 : 0) + '%';

  // cat tabs
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = [{id:'all',label:'Tümü',emoji:''}].concat(CATS).map(c => {
    const active = activeCat === c.id ? 'active' : '';
    return `<div class="cat-tab ${active}" onclick="setCat('${c.id}')">${c.emoji ? c.emoji+' ':''  }${c.label||'Tümü'}</div>`;
  }).join('');

  const q = document.getElementById('search').value.toLowerCase().trim();
  const catsToShow = activeCat === 'all' ? CATS : CATS.filter(c => c.id === activeCat);
  let html = '';

  catsToShow.forEach(cat => {
    const items = getVisible(cat);
    if (!items.length) return;
    if (activeCat === 'all') html += `<div class="cat-label">${cat.emoji} ${cat.label}</div>`;
    items.forEach(it => {
      const k = key(cat.id, it.n);
      const s = state[k] || {};
      const done = s.checked;
      const low = isLow(k);
      const qty = s.qty || 0;
      const threshold = s.threshold || 1;
      const unit = s.unit || 'adet';
      const qClass = done ? '' : getQtyClass(qty, threshold);
      const stepVal = unit === 'gr' || unit === 'ml' ? 100 : (unit === 'kg' || unit === 'lt' ? 1 : 1);

      let badgeHtml = '';
      if (done) badgeHtml = `<div class="badge var">Var</div>`;
      else if (low && qty === 0) badgeHtml = `<div class="badge eksik">Eksik</div>`;
      else if (low) badgeHtml = `<div class="badge az">Az</div>`;
      else badgeHtml = `<div class="badge eksik">Eksik</div>`;

      html += `<div class="item ${done?'done':''} ${low&&!done?'low-stock':''}">
        <div class="item-top" onclick="toggleCheck('${k.replace(/'/g,"\\'")}', event)">
          <div class="check">
            <svg class="check-svg" width="11" height="11" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="#0f0f0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="item-body">
            <div class="item-name">${it.n}</div>
            ${it.note ? `<div class="item-note">${it.note}</div>` : ''}
          </div>
          ${badgeHtml}
        </div>
        <div class="item-qty">
          <div class="qty-label">Miktar</div>
          <div class="qty-controls">
            <div class="qty-btn" onclick="changeQty('${k.replace(/'/g,"\\'")}', -${stepVal}, event)">−</div>
            <div class="qty-val ${qClass}">${qty}</div>
            <div class="qty-unit">${unit}</div>
            <div class="qty-btn" onclick="changeQty('${k.replace(/'/g,"\\'")}', ${stepVal}, event)">+</div>
          </div>
          ${low && !done ? `<div class="low-badge">⚠ Az kaldı</div>` : ''}
        </div>
      </div>`;
    });
  });

  if (!html) html = `<div class="empty"><div class="empty-icon">${filter==='az'?'✅':'🔍'}</div>${filter==='az'?'Harika! Az kalan ürün yok.':'Sonuç bulunamadı'}</div>`;
  document.getElementById('list').innerHTML = html;
}

// ADD SHEET
function openAdd() {
  document.getElementById('new-name').value = '';
  document.getElementById('new-note').value = '';
  document.getElementById('new-qty').value = '';
  document.getElementById('new-threshold').value = '';
  newUnit = 'adet';
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.toggle('active', b.textContent === 'Adet'));
  document.getElementById('cat-list').innerHTML = CATS.map(c =>
    `<div class="cat-option ${c.id===newCatId?'selected':''}" onclick="selectNewCat('${c.id}',this)">
      <span class="cat-emoji">${c.emoji}</span>${c.label}
    </div>`
  ).join('');
  document.getElementById('sheet').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('new-name').focus(), 300);
}

function selectUnit(u, el) {
  newUnit = u;
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function selectNewCat(id, el) {
  newCatId = id;
  document.querySelectorAll('.cat-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

function addItem() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { document.getElementById('new-name').focus(); return; }
  const note = document.getElementById('new-note').value.trim();
  const qty = parseFloat(document.getElementById('new-qty').value) || 0;
  const threshold = parseFloat(document.getElementById('new-threshold').value) || (newUnit === 'gr' || newUnit === 'ml' ? 100 : 1);
  const cat = CATS.find(c => c.id === newCatId);
  if (!cat) return;
  cat.items.push({n: name, note: note || undefined, unit: newUnit, qty, threshold});
  const k = key(newCatId, name);
  state[k] = {checked: false, qty, unit: newUnit, threshold};
  save(); closeSheet(); render();
  toast('Eklendi: ' + name);
}

init();
render();
</script>
